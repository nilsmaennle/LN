<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FundingMatch — KI-Förderanalyse</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0b0e;
    --bg1: #111318;
    --bg2: #181b22;
    --bg3: #1e222c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --text2: #8b90a0;
    --text3: #555a6a;
    --accent: #4ade80;
    --accent2: #22c55e;
    --accent-dim: rgba(74,222,128,0.08);
    --accent-dim2: rgba(74,222,128,0.15);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.08);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.08);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.08);
    --radius: 10px;
    --radius-lg: 14px;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  html, body, #root { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
  textarea, input, select {
    font-family: var(--font-mono);
    font-size: 13px;
    background: var(--bg2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  textarea:focus, input:focus, select:focus { border-color: var(--border2); }
  select option { background: var(--bg2); }
  button { font-family: var(--font-mono); cursor: pointer; border: none; outline: none; }

  .app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--bg1);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: var(--font-head);
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent2); }
  .logo-sub { font-size: 10px; font-weight: 400; color: var(--text3); font-family: var(--font-mono); letter-spacing: 0.04em; margin-top: 2px; }
  .nav { padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    color: var(--text2);
    font-size: 12.5px;
    cursor: pointer;
    transition: all 0.12s;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--bg2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(74,222,128,0.15); }
  .nav-icon { font-size: 15px; opacity: 0.8; }
  .sidebar-section { padding: 0 10px 8px; }
  .sidebar-section-label { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; padding: 12px 12px 4px; }
  .profile-card {
    margin: 0 10px 10px;
    padding: 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .profile-label { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .profile-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .profile-key { font-size: 11px; color: var(--text2); }
  .profile-val { font-size: 11px; color: var(--text); font-weight: 500; max-width: 120px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500;
  }
  .badge-green { background: var(--accent-dim2); color: var(--accent); }
  .badge-blue { background: var(--blue-dim); color: var(--blue); }
  .badge-amber { background: var(--amber-dim); color: var(--amber); }
  .badge-red { background: var(--red-dim); color: var(--red); }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg1);
    min-height: 57px;
  }
  .topbar-title { font-family: var(--font-head); font-size: 14px; font-weight: 600; color: var(--text); }
  .topbar-meta { font-size: 11px; color: var(--text3); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Chat area */
  .chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .message { display: flex; gap: 12px; max-width: 820px; }
  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  .avatar {
    width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600;
  }
  .avatar-ai { background: var(--accent-dim2); color: var(--accent); border: 1px solid rgba(74,222,128,0.2); }
  .avatar-user { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }
  .bubble {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    font-size: 13.5px;
    line-height: 1.65;
    flex: 1;
  }
  .bubble.user { background: var(--bg3); }
  .bubble pre { white-space: pre-wrap; font-family: var(--font-mono); font-size: 12.5px; }

  /* Structured result card */
  .result-card {
    background: var(--bg1);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-top: 12px;
  }
  .result-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .result-title { font-family: var(--font-head); font-size: 14px; font-weight: 700; color: var(--text); }
  .result-subtitle { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .score-ring {
    display: flex; align-items: center; gap: 6px;
  }
  .score-num {
    font-family: var(--font-head); font-size: 22px; font-weight: 800;
  }
  .score-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
  .result-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
  .result-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .result-block {
    flex: 1; min-width: 180px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
  }
  .result-block-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .result-block-content { font-size: 12.5px; color: var(--text); }
  .criterion { display: flex; align-items: flex-start; gap: 6px; font-size: 12px; margin-bottom: 4px; }
  .crit-icon { font-size: 11px; flex-shrink: 0; margin-top: 1px; }
  .crit-ok { color: var(--accent); }
  .crit-warn { color: var(--amber); }
  .crit-miss { color: var(--red); }
  .steps-list { counter-reset: steps; }
  .step-item {
    display: flex; gap: 8px; align-items: flex-start; font-size: 12px;
    padding: 4px 0; border-bottom: 1px solid var(--border); color: var(--text2);
  }
  .step-item:last-child { border-bottom: none; }
  .step-num {
    font-family: var(--font-head); font-size: 10px; font-weight: 700;
    width: 18px; height: 18px; border-radius: 4px;
    background: var(--bg3); color: var(--text3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }

  /* Input area */
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg1);
  }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  .input-wrap { flex: 1; position: relative; }
  .chat-input {
    resize: none; min-height: 44px; max-height: 140px;
    padding: 11px 14px; line-height: 1.5;
    border-radius: var(--radius);
    font-size: 13.5px;
  }
  .send-btn {
    width: 44px; height: 44px; border-radius: var(--radius); flex-shrink: 0;
    background: var(--accent-dim2);
    border: 1px solid rgba(74,222,128,0.25);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.12s;
  }
  .send-btn:hover { background: rgba(74,222,128,0.25); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .input-hint { font-size: 10.5px; color: var(--text3); margin-top: 6px; }

  /* Welcome screen */
  .welcome {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px; padding: 40px;
    text-align: center;
  }
  .welcome-icon {
    width: 64px; height: 64px; border-radius: 18px;
    background: var(--accent-dim2); border: 1px solid rgba(74,222,128,0.2);
    display: flex; align-items: center; justify-content: center; font-size: 28px;
  }
  .welcome-title { font-family: var(--font-head); font-size: 28px; font-weight: 800; color: var(--text); }
  .welcome-sub { font-size: 13px; color: var(--text2); max-width: 480px; line-height: 1.7; }
  .quick-prompts { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 600px; }
  .quick-btn {
    padding: 8px 14px; border-radius: 99px; font-size: 12px;
    background: var(--bg2); border: 1px solid var(--border2); color: var(--text2);
    font-family: var(--font-mono);
    transition: all 0.12s;
  }
  .quick-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }

  /* Profile modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--bg1); border: 1px solid var(--border2);
    border-radius: var(--radius-lg); padding: 24px;
    width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-family: var(--font-head); font-size: 16px; font-weight: 700; margin-bottom: 20px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1/-1; }
  .form-label { font-size: 11px; color: var(--text2); letter-spacing: 0.05em; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn-primary {
    padding: 9px 20px; border-radius: 8px; font-size: 13px;
    background: var(--accent-dim2); border: 1px solid rgba(74,222,128,0.3); color: var(--accent);
    font-family: var(--font-mono); transition: all 0.12s;
  }
  .btn-primary:hover { background: rgba(74,222,128,0.25); }
  .btn-ghost {
    padding: 9px 20px; border-radius: 8px; font-size: 13px;
    background: transparent; border: 1px solid var(--border); color: var(--text2);
    font-family: var(--font-mono); transition: all 0.12s;
  }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

  /* API key screen */
  .api-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; padding: 40px;
  }
  .api-card {
    background: var(--bg1); border: 1px solid var(--border2);
    border-radius: var(--radius-lg); padding: 28px; width: 440px; max-width: 95vw;
  }
  .api-title { font-family: var(--font-head); font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .api-sub { font-size: 12px; color: var(--text2); margin-bottom: 20px; line-height: 1.6; }
  .api-input { font-size: 13px; letter-spacing: 0.03em; }
  .api-help { font-size: 11px; color: var(--text3); margin-top: 8px; }
  .api-help a { color: var(--blue); text-decoration: none; }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); animation: blink 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }

  /* Scrollbar for chat */
  .chat-area { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }

  /* Program list */
  .program-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .program-item {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; transition: border-color 0.12s;
  }
  .program-item:hover { border-color: var(--border2); }
  .prog-name { font-size: 12.5px; color: var(--text); font-weight: 500; }
  .prog-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .score-bar-wrap { width: 80px; }
  .score-bar-bg { height: 4px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .score-bar-fill { height: 4px; border-radius: 99px; transition: width 0.4s; }

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SYSTEM_PROMPT = `Du bist FundingMatch, ein hochspezialisiertes KI-System zur Analyse von Fördermöglichkeiten, Zuschüssen, Finanzierungsprogrammen und Investor-Eligibility für Startups und Unternehmen im deutschsprachigen und europäischen Raum.

DEINE KERNAUFGABE:
Analysiere das Nutzerprofil und identifiziere passende Förderprogramme. Bewerteigene die Eignung strukturiert und präzise.

ANTWORTFORMAT:
Wenn du Förderprogramme identifizierst, strukturiere die Antwort als JSON innerhalb von <FUNDING_RESULT> Tags:
<FUNDING_RESULT>
{
  "programs": [
    {
      "name": "Name des Programms",
      "provider": "Anbieter (z.B. BMBF, EU, KfW)",
      "type": "Grant|Loan|Equity|Tax|Accelerator",
      "score": 85,
      "scoreColor": "green|amber|red",
      "maxAmount": "500.000 €",
      "deadline": "Rollierend|Q1 2025|etc.",
      "summary": "Kurzbeschreibung",
      "requirements": ["Anforderung 1", "Anforderung 2"],
      "matched": ["Erfülltes Kriterium 1"],
      "missing": ["Fehlendes Kriterium 1"],
      "nextSteps": ["Schritt 1", "Schritt 2", "Schritt 3"]
    }
  ],
  "profileSummary": "Kurze Zusammenfassung des Nutzerprofils",
  "extractedProfile": {
    "phase": "Seed",
    "industry": "FinTech",
    "location": "Deutschland",
    "teamSize": "3-5",
    "revenue": "Pre-Revenue",
    "model": "B2B SaaS"
  }
}
</FUNDING_RESULT>

WICHTIGE REGELN:
- Score 80-100: Sehr gut geeignet (green)
- Score 50-79: Teilweise geeignet (amber)  
- Score 0-49: Schlecht geeignet (red)
- Maximal 4 Programme pro Antwort, priorisiert nach Match-Score
- Nur echte, existierende Förderprogramme nennen
- Keine Floskeln, direkte Aussagen
- Fehlende Informationen aktiv erfragen
- Wenn kein Profil vorhanden: Zuerst Kernfragen stellen (Branche, Phase, Standort, Team, Umsatz)
- Antworte auf Deutsch
- Für allgemeine Fragen (kein Förder-Matching nötig): Normal antworten ohne JSON`;

function parseAIResponse(text) {
  const match = text.match(/<FUNDING_RESULT>([\s\S]*?)<\/FUNDING_RESULT>/);
  if (!match) return { text, structured: null };
  try {
    const json = JSON.parse(match[1].trim());
    const cleanText = text.replace(/<FUNDING_RESULT>[\s\S]*?<\/FUNDING_RESULT>/, '').trim();
    return { text: cleanText, structured: json };
  } catch {
    return { text, structured: null };
  }
}

function ScoreColor({ score, color }) {
  const col = color === 'green' ? '#4ade80' : color === 'amber' ? '#fbbf24' : '#f87171';
  return (
    <div className="score-ring">
      <div>
        <div className="score-num" style={{ color: col }}>{score}</div>
        <div className="score-label">Match</div>
      </div>
    </div>
  );
}

function FundingCard({ program }) {
  const [open, setOpen] = useState(false);
  const barColor = program.scoreColor === 'green' ? '#4ade80' : program.scoreColor === 'amber' ? '#fbbf24' : '#f87171';
  const typeColors = { Grant: 'badge-green', Loan: 'badge-blue', Equity: 'badge-amber', Tax: 'badge-blue', Accelerator: 'badge-amber' };

  return (
    <div className="result-card" style={{ marginTop: 0 }}>
      <div className="result-header" onClick={() => setOpen(!open)} style={{ cursor: 'pointer' }}>
        <div>
          <div className="result-title">{program.name}</div>
          <div className="result-subtitle" style={{ display: 'flex', gap: 6, alignItems: 'center', marginTop: 4 }}>
            <span style={{ color: 'var(--text3)' }}>{program.provider}</span>
            <span style={{ color: 'var(--text3)' }}>·</span>
            <span className={`badge ${typeColors[program.type] || 'badge-blue'}`}>{program.type}</span>
            {program.maxAmount && <span style={{ color: 'var(--text2)', fontSize: 11 }}>bis {program.maxAmount}</span>}
            {program.deadline && <span style={{ color: 'var(--text3)', fontSize: 11 }}>{program.deadline}</span>}
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <ScoreColor score={program.score} color={program.scoreColor} />
          <span style={{ color: 'var(--text3)', fontSize: 16, transition: 'transform 0.2s', transform: open ? 'rotate(180deg)' : 'none', display: 'inline-block' }}>▾</span>
        </div>
      </div>

      {open && (
        <div className="result-body">
          <p style={{ fontSize: 12.5, color: 'var(--text2)', lineHeight: 1.6 }}>{program.summary}</p>

          <div className="result-row">
            {program.matched?.length > 0 && (
              <div className="result-block">
                <div className="result-block-label">✓ Erfüllt</div>
                <div className="result-block-content">
                  {program.matched.map((m, i) => (
                    <div key={i} className="criterion"><span className="crit-icon crit-ok">✓</span><span>{m}</span></div>
                  ))}
                </div>
              </div>
            )}
            {program.missing?.length > 0 && (
              <div className="result-block">
                <div className="result-block-label">✗ Fehlend</div>
                <div className="result-block-content">
                  {program.missing.map((m, i) => (
                    <div key={i} className="criterion"><span className="crit-icon crit-miss">✗</span><span>{m}</span></div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {program.requirements?.length > 0 && (
            <div className="result-block">
              <div className="result-block-label">Anforderungen</div>
              <div className="result-block-content">
                {program.requirements.map((r, i) => (
                  <div key={i} className="criterion"><span className="crit-icon" style={{ color: 'var(--text3)' }}>—</span><span>{r}</span></div>
                ))}
              </div>
            </div>
          )}

          {program.nextSteps?.length > 0 && (
            <div className="result-block">
              <div className="result-block-label">Nächste Schritte</div>
              <div className="steps-list">
                {program.nextSteps.map((s, i) => (
                  <div key={i} className="step-item">
                    <span className="step-num">{i + 1}</span>
                    <span>{s}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function MessageBubble({ msg }) {
  if (msg.role === 'user') {
    return (
      <div className="message user">
        <div className="avatar avatar-user">Du</div>
        <div className="bubble user"><pre>{msg.content}</pre></div>
      </div>
    );
  }

  const { text, structured } = parseAIResponse(msg.content);

  return (
    <div className="message">
      <div className="avatar avatar-ai">FM</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        {text && <div className="bubble"><pre>{text}</pre></div>}
        {structured && (
          <div style={{ marginTop: text ? 12 : 0 }}>
            {structured.profileSummary && (
              <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 10, padding: '6px 12px', background: 'var(--bg2)', borderRadius: 8, borderLeft: '2px solid var(--accent)' }}>
                {structured.profileSummary}
              </div>
            )}
            {structured.programs?.length > 0 && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {structured.programs.map((p, i) => <FundingCard key={i} program={p} />)}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function ApiKeyScreen({ onSave }) {
  const [key, setKey] = useState('');
  return (
    <div className="api-screen">
      <div className="api-card">
        <div style={{ fontSize: 32, marginBottom: 12 }}>🔑</div>
        <div className="api-title">API-Schlüssel einrichten</div>
        <div className="api-sub">
          FundingMatch nutzt die Anthropic Claude API direkt in deinem Browser. Dein API-Key wird ausschließlich lokal im Browser gespeichert und niemals an Server übertragen.
        </div>
        <input
          className="api-input"
          type="password"
          placeholder="sk-ant-api..."
          value={key}
          onChange={e => setKey(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && key.startsWith('sk-') && onSave(key)}
        />
        <div className="api-help">
          API-Key erstellen: <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys → Create Key.<br />
          Kosten: ~$0.003 pro Anfrage (Claude Sonnet 4).
        </div>
        <div className="modal-actions" style={{ justifyContent: 'flex-start', marginTop: 16 }}>
          <button className="btn-primary" disabled={!key.startsWith('sk-')} onClick={() => onSave(key)}>
            Speichern & starten →
          </button>
        </div>
      </div>
    </div>
  );
}

const QUICK_PROMPTS = [
  "Welche Förderprogramme passen zu meinem Startup?",
  "Ich bin HealthTech Startup, Seed-Phase, Berlin — was passt?",
  "Welche EU-Förderungen gibt es für DeepTech?",
  "Erkläre mir den Unterschied zwischen KfW und EXIST",
  "Ich suche Grants für ein KI-Startup in Bayern",
];

function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('fm_apikey') || '');
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [view, setView] = useState('chat');
  const [profile, setProfile] = useState(() => {
    try { return JSON.parse(localStorage.getItem('fm_profile') || '{}'); } catch { return {}; }
  });
  const [showProfile, setShowProfile] = useState(false);
  const chatRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, loading]);

  const saveApiKey = (key) => {
    localStorage.setItem('fm_apikey', key);
    setApiKey(key);
  };

  const saveProfile = (p) => {
    localStorage.setItem('fm_profile', JSON.stringify(p));
    setProfile(p);
    setShowProfile(false);
  };

  const profileContext = () => {
    const filled = Object.entries(profile).filter(([k, v]) => v && k !== 'description');
    if (!filled.length) return '';
    return '\n\n[NUTZERPROFIL]\n' + filled.map(([k, v]) => `${k}: ${v}`).join('\n') + (profile.description ? `\nBeschreibung: ${profile.description}` : '');
  };

  const sendMessage = async (text) => {
    if (!text.trim() || loading) return;
    const userMsg = { role: 'user', content: text.trim() };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput('');
    setLoading(true);

    try {
      const apiMessages = newMessages.map(m => ({ role: m.role, content: m.content }));
      if (apiMessages.length === 1 && Object.keys(profile).length > 0) {
        apiMessages[0] = { ...apiMessages[0], content: apiMessages[0].content + profileContext() };
      }

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          system: SYSTEM_PROMPT,
          messages: apiMessages,
        }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || 'API Fehler');
      }

      const data = await res.json();
      const aiText = data.content.map(b => b.text || '').join('');
      setMessages(prev => [...prev, { role: 'assistant', content: aiText }]);
    } catch (err) {
      setMessages(prev => [...prev, { role: 'assistant', content: `Fehler: ${err.message}` }]);
    }
    setLoading(false);
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input); }
  };

  const profileFilled = Object.values(profile).filter(Boolean).length;
  const phaseColors = { 'Idee / Pre-Seed': 'amber', 'Seed': 'green', 'Early Stage': 'green', 'Growth': 'blue', 'Scale': 'blue' };
  const pColor = phaseColors[profile.phase] || 'amber';

  if (!apiKey) return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-header">
          <div className="logo"><div className="logo-dot" />FundingMatch</div>
          <div className="logo-sub">KI-FÖRDERANALYSE</div>
        </div>
      </div>
      <div className="main"><ApiKeyScreen onSave={saveApiKey} /></div>
    </div>
  );

  return (
    <div className="app">
      {showProfile && <ProfileModal profile={profile} onSave={saveProfile} onClose={() => setShowProfile(false)} />}

      <div className="sidebar">
        <div className="sidebar-header">
          <div className="logo"><div className="logo-dot" />FundingMatch</div>
          <div className="logo-sub">KI-FÖRDERANALYSE · v1.0</div>
        </div>

        <div className="nav">
          <div className={`nav-item ${view === 'chat' ? 'active' : ''}`} onClick={() => setView('chat')}>
            <span className="nav-icon">◈</span> Analyse-Chat
          </div>
          <div className={`nav-item ${view === 'guide' ? 'active' : ''}`} onClick={() => setView('guide')}>
            <span className="nav-icon">◎</span> Programmübersicht
          </div>
        </div>

        <div className="sidebar-section-label">Dein Profil</div>
        <div className="profile-card">
          <div className="profile-label">UNTERNEHMEN</div>
          {profileFilled > 0 ? (
            <>
              {profile.company && <div className="profile-row"><span className="profile-key">Name</span><span className="profile-val">{profile.company}</span></div>}
              {profile.phase && <div className="profile-row"><span className="profile-key">Phase</span><span className={`badge badge-${pColor === 'green' ? 'green' : pColor === 'blue' ? 'blue' : 'amber'}`}>{profile.phase}</span></div>}
              {profile.industry && <div className="profile-row"><span className="profile-key">Branche</span><span className="profile-val">{profile.industry}</span></div>}
              {profile.location && <div className="profile-row"><span className="profile-key">Standort</span><span className="profile-val">{profile.location}</span></div>}
              {profile.teamSize && <div className="profile-row"><span className="profile-key">Team</span><span className="profile-val">{profile.teamSize}</span></div>}
              {profile.revenue && <div className="profile-row"><span className="profile-key">Umsatz</span><span className="profile-val">{profile.revenue}</span></div>}
            </>
          ) : (
            <div style={{ fontSize: 11, color: 'var(--text3)', textAlign: 'center', padding: '8px 0' }}>
              Noch kein Profil — für bessere Matches ausfüllen
            </div>
          )}
          <button onClick={() => setShowProfile(true)} className="btn-ghost" style={{ width: '100%', marginTop: 10, fontSize: 11, padding: '6px' }}>
            {profileFilled > 0 ? '✎ Bearbeiten' : '+ Profil anlegen'}
          </button>
        </div>

        <div style={{ flex: 1 }} />
        <div style={{ padding: '12px 10px', borderTop: '1px solid var(--border)' }}>
          <div style={{ fontSize: 10, color: 'var(--text3)', padding: '0 12px' }}>
            <span className="status-dot" />API verbunden · Claude Sonnet 4
          </div>
          <button onClick={() => { localStorage.removeItem('fm_apikey'); setApiKey(''); }}
            className="btn-ghost" style={{ width: '100%', marginTop: 8, fontSize: 11, padding: '6px' }}>
            API-Key ändern
          </button>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div>
            <div className="topbar-title">
              {view === 'chat' ? 'Förder-Analyse' : 'Programm-Übersicht'}
            </div>
            <div className="topbar-meta">
              {messages.length > 0 ? `${Math.ceil(messages.length / 2)} Anfrage${messages.length > 2 ? 'n' : ''}` : 'Bereit für deine Anfrage'}
            </div>
          </div>
          {messages.length > 0 && (
            <button onClick={() => setMessages([])} className="btn-ghost" style={{ fontSize: 11, padding: '5px 12px' }}>
              ↺ Neu
            </button>
          )}
        </div>

        {view === 'guide' ? (
          <div className="chat-area">
            <ProgramGuide onAsk={(q) => { setView('chat'); setTimeout(() => sendMessage(q), 100); }} />
          </div>
        ) : (
          <>
            <div className="chat-area" ref={chatRef}>
              {messages.length === 0 ? (
                <div className="welcome">
                  <div className="welcome-icon">◈</div>
                  <div>
                    <div className="welcome-title">FundingMatch</div>
                    <div className="welcome-sub" style={{ marginTop: 10 }}>
                      Beschreibe dein Startup oder Unternehmen — ich identifiziere passende Förderprogramme, Grants und Finanzierungsmöglichkeiten und bewerte deine Eignung.
                    </div>
                  </div>
                  <div className="quick-prompts">
                    {QUICK_PROMPTS.map((q, i) => (
                      <button key={i} className="quick-btn" onClick={() => sendMessage(q)}>{q}</button>
                    ))}
                  </div>
                  {profileFilled === 0 && (
                    <button onClick={() => setShowProfile(true)} className="btn-primary" style={{ fontSize: 12 }}>
                      + Profil anlegen für bessere Ergebnisse
                    </button>
                  )}
                </div>
              ) : (
                messages.map((m, i) => <MessageBubble key={i} msg={m} />)
              )}
              {loading && (
                <div className="message">
                  <div className="avatar avatar-ai">FM</div>
                  <div className="bubble"><div className="typing"><div className="typing-dot" /><div className="typing-dot" /><div className="typing-dot" /></div></div>
                </div>
              )}
            </div>

            <div className="input-area">
              <div className="input-row">
                <div className="input-wrap">
                  <textarea
                    ref={inputRef}
                    className="chat-input"
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={handleKey}
                    placeholder="Beschreibe dein Startup, deine Branche, Phase und Standort..."
                    rows={1}
                  />
                </div>
                <button className="send-btn" disabled={!input.trim() || loading} onClick={() => sendMessage(input)}>
                  ↑
                </button>
              </div>
              <div className="input-hint">Enter senden · Shift+Enter Zeilenumbruch</div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

const PROGRAMS = [
  { name: 'EXIST-Gründerstipendium', provider: 'BMWK / ESF', type: 'Grant', amount: 'bis 150K €', phase: 'Pre-Seed', focus: 'Hochschul-Spin-offs', desc: 'Stipendium für Gründerteams aus Hochschulen und Forschungseinrichtungen. Lebensunterhalt + Sachkosten + Coaching.' },
  { name: 'EXIST-Forschungstransfer', provider: 'BMWK', type: 'Grant', amount: 'bis 800K €', phase: 'Pre-Seed/Seed', focus: 'DeepTech / Forschung', desc: 'Zweistufiges Programm für technologieintensive Gründungen aus der Forschung.' },
  { name: 'ZIM – Zentrales Innovationsprogramm Mittelstand', provider: 'BMWK', type: 'Grant', amount: 'bis 550K €', phase: 'Seed–Growth', focus: 'F&E Projekte', desc: 'Förderung von F&E-Projekten für KMU und Mittelstand. Auch Kooperationsprojekte möglich.' },
  { name: 'Horizon Europe – EIC Accelerator', provider: 'EU / EIC', type: 'Grant + Equity', amount: 'bis 17,5M €', phase: 'Growth', focus: 'Deep Tech, Climate', desc: 'Europas wichtigstes Programm für bahnbrechende Innovationen. Grant-Komponente + optionale Equity.' },
  { name: 'ERP-Gründerkredit Startgeld', provider: 'KfW', type: 'Loan', amount: 'bis 125K €', phase: 'Pre-Seed–Seed', focus: 'Gründung & Frühphase', desc: 'Zinsgünstiger Kredit für Existenzgründer. Haftungsfreistellung 80% für Hausbank.' },
  { name: 'KfW StartGeld', provider: 'KfW', type: 'Loan', amount: 'bis 125K €', phase: 'Seed', focus: 'Alle Branchen', desc: 'Für Freiberufler und Gründer unter 5 Jahre. Günstige Zinsen, tilgungsfreie Jahre möglich.' },
  { name: 'INVEST – Zuschuss Wagniskapital', provider: 'BMWK', type: 'Tax/Grant', amount: '20% auf Investment', phase: 'Seed–Early Stage', focus: 'Business Angel Deals', desc: 'Business Angels erhalten 20% Erwerbszuschuss auf Investmentsumme (max. 500K €). Attraktiv für Angel-Runden.' },
  { name: 'Innovationsgutscheine (z.B. Bayern, BW)', provider: 'Länder', type: 'Grant', amount: 'bis 25K €', phase: 'Seed–Growth', focus: 'Beratung & FuE', desc: 'Länderspezifische Gutscheine für externe Innovationsberatung oder FuE-Kooperationen.' },
  { name: 'Digital Hub Initiative', provider: 'BMWK / BMD', type: 'Grant', amount: 'variabel', phase: 'Seed–Scale', focus: 'Digitalisierung', desc: 'Förderung durch Zugang zu Infrastruktur, Mentoring und Netzwerken in deutschen Digital Hubs.' },
  { name: 'DATI – Deutsche Agentur für Transfer und Innovation', provider: 'BMBF', type: 'Grant', amount: 'variabel', phase: 'Seed–Growth', focus: 'FH-Ausgründungen', desc: 'Neue Förderagentur für transferorientierte Hochschulen. Fokus auf praxisnahe Innovationen.' },
];

function ProgramGuide({ onAsk }) {
  const [filter, setFilter] = useState('Alle');
  const phases = ['Alle', 'Pre-Seed', 'Seed', 'Growth', 'Scale'];
  const filtered = filter === 'Alle' ? PROGRAMS : PROGRAMS.filter(p => p.phase.includes(filter.replace('Scale','Growth')));
  const typeColors = { Grant: 'badge-green', Loan: 'badge-blue', 'Grant + Equity': 'badge-amber', 'Tax/Grant': 'badge-blue' };

  return (
    <div style={{ maxWidth: 760 }}>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontFamily: 'var(--font-head)', fontSize: 18, fontWeight: 700, marginBottom: 6 }}>Förderprogramme im Überblick</div>
        <div style={{ fontSize: 12, color: 'var(--text2)' }}>Klicke auf ein Programm um eine detaillierte Analyse zu starten</div>
      </div>
      <div style={{ display: 'flex', gap: 6, marginBottom: 16, flexWrap: 'wrap' }}>
        {phases.map(p => (
          <button key={p} onClick={() => setFilter(p)}
            style={{ padding: '5px 14px', borderRadius: 99, fontSize: 11.5, fontFamily: 'var(--font-mono)', cursor: 'pointer', border: '1px solid', transition: 'all 0.12s',
              background: filter === p ? 'var(--accent-dim2)' : 'var(--bg2)',
              borderColor: filter === p ? 'rgba(74,222,128,0.3)' : 'var(--border)',
              color: filter === p ? 'var(--accent)' : 'var(--text2)' }}>
            {p}
          </button>
        ))}
      </div>
      <div className="program-list">
        {filtered.map((p, i) => (
          <div key={i} className="program-item" onClick={() => onAsk(`Analysiere meine Eignung für "${p.name}". Erkläre die Anforderungen und nächste Schritte.`)}>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 }}>
                <span className="prog-name">{p.name}</span>
                <span className={`badge ${typeColors[p.type] || 'badge-blue'}`}>{p.type}</span>
              </div>
              <div className="prog-meta">{p.provider} · {p.amount} · {p.focus}</div>
              <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 4, lineHeight: 1.5 }}>{p.desc}</div>
            </div>
            <div style={{ fontSize: 16, color: 'var(--text3)', marginLeft: 12, flexShrink: 0 }}>→</div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
